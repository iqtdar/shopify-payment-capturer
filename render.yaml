# render.yaml — Render Blueprint
# Render Professional Plan — Web Service

services:
  - type: web
    name: shopify-payment-capturer
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: node index.js
    autoDeploy: true
    branch: main
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PAY_LATER_DELAY_MINUTES
        value: "9360"
      - key: SHOPIFY_API_VERSION
        value: "2024-01"
      # ── Set these in the Render Dashboard → Environment (never commit real values) ──
      # - key: SHOPIFY_SHOP
      # - key: SHOPIFY_CLIENT_ID
      # - key: SHOPIFY_CLIENT_SECRET
      # - key: SHOPIFY_WEBHOOK_SECRET
